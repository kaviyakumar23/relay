# Relay — PROD app manifest (HTTP mode, served from Fly.io).
# Request URLs point at the app's Fly-provided HTTPS host (relay-crisis.fly.dev);
# Fly gives us TLS on *.fly.dev out of the box, so no CDN/cert layer is needed.
# If the app name changes, update the three request URLs below. See docs/DEPLOY.md.
display_information:
  name: Relay — Crisis Coordination
  description: Verified crisis coordination — every need tracked, every promise proven.
  background_color: "#B71C1C"
features:
  bot_user:
    display_name: relay
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  assistant_view:
    assistant_description: Ask Relay about live relief operations — open needs, drifting promises, verified deliveries.
    suggested_prompts:
      - title: Open critical needs
        message: Any critical needs still open?
      - title: Who is drifting?
        message: Which obligations are past their SLA right now?
      - title: Sitrep
        message: Give me the current situation report.
  slash_commands:
    - command: /relay
      url: https://relay-crisis.fly.dev/slack/events
      description: sitrep · report · volunteer · volunteers · demo
      usage_hint: "sitrep | report | volunteer | volunteers | demo start flood-1"
      should_escape: false
# Scope/event audit 2026-07-07: reconciled against actual call sites + registered
# handlers. REMOVED app_mentions:read (no app_mention handler), reactions:read +
# reactions:write (no reactions.* call site, no reaction_added handler). KEPT the
# groups:* scopes + message.groups: resolveRoles() lists private_channel via
# conversations.list (groups:read) and app.message() handles private-channel intake
# (groups:history + message.groups) — the intake channel may be private for PII reasons.
oauth_config:
  scopes:
    bot:
      - assistant:write
      - canvases:read
      - canvases:write
      - channels:history
      - channels:read
      - chat:write
      - chat:write.customize
      - commands
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
    # User-token scope for the Real-Time Search API (assistant.search.context).
    # search:read.public lets Ask-Relay ground answers in live public-channel context on
    # behalf of the authenticated user; the user-token path needs no action_token. Keep this
    # to search:read.* only — do NOT add user-token *:history scopes (RTS rule: they conflict
    # with the message.* bot events above). Semantic search needs a Slack AI Search plan; the
    # sandbox falls back to keyword, which assistant.search.info detects.
    user:
      - search:read.public
settings:
  event_subscriptions:
    request_url: https://relay-crisis.fly.dev/slack/events
    bot_events:
      - app_home_opened
      - assistant_thread_started
      - assistant_thread_context_changed
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://relay-crisis.fly.dev/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
